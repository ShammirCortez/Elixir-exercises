#i've never made a workflow myself before, so this was done by an AI to automerge the pull requests the exercism bot is making

name: Auto-Merge Exercism PRs

on:
  pull_request:
    types:
      - opened
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  exercism-auto-merge:
    runs-on: ubuntu-latest
    # Secure Guard: Only run if the PR is created by Exercism's sync bot
    if: github.event.pull_request.user.login == 'exercism-solutions-syncer[bot]'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Squash-Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Bypasses the UI settings and merges instantly as a clean squash commit
          gh pr merge "$PR_URL" --squash --admin
